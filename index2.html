<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- add daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- add google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- css file  -->

    <link rel="stylesheet" href="style.css">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>

    <!-- header  -->
    <header class=" sm:flex justify-between items-center m-2 sm:m-6 space-y-3 shadow-xl rounded-xl p-3">
        <div class="flex items-center gap-2 sm:gap-4">
            <img class="h-[50px]" src="assets/github-logo.png" alt="">
            <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
            <label class="input">
                <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </header>



</body>

</html>
