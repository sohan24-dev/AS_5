<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- add daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- add google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <main class="w-4/12 mx-auto shadow-xl p-7 ">
        <div class=" text-center space-y-4">
            <img class="mx-auto" src="assets/github-logo.png" alt="">
            <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
            <p class="">Sign in to manage your issues</p>
        </div>
        <!-- userInput  -->
        <div class="m-3 space-y-3">
            <label class="block font-semibold text-lg text-gray-700 ">
                Username <br>
                <input id="username" type="text" required placeholder="Enter Username"
                    class="border p-2 rounded w-full my-3" />
            </label>
            <label class="block font-semibold text-lg text-gray-700 ">
                Password <br>
                <input id="password" type="password" required placeholder="Enter Password"
                    class="border p-2 rounded w-full my-3" />
            </label>

            <button id="singInbtn" class="btn btn-primary w-full">Sign In</button>

        </div>

    </main>
    <script src="index.js"></script>
</body>

</html>
